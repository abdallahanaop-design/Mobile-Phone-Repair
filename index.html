<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتب المحاماة الفخم</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#0a0a0a,#1a1a2e);
color:#fff;
overflow-x:hidden;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
padding:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
position:sticky;
top:0;
}

nav h1{
color:#00f7ff;
}

nav a{
color:#fff;
margin:0 10px;
text-decoration:none;
}

/* HERO */
.hero{
text-align:center;
padding:100px 20px;
}

.hero h2{
font-size:40px;
color:#00f7ff;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px #00f7ff;}
to{text-shadow:0 0 30px #00f7ff;}
}

/* SERVICES */
.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:40px;
}

.card{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:20px;
text-align:center;
cursor:pointer;
transition:0.3s;
position:relative;
overflow:hidden;
}

.card:hover{
transform:scale(1.1);
box-shadow:0 0 20px #00f7ff;
}

.card i{
font-size:40px;
margin-bottom:10px;
}

/* CONSULTANTS */
.consultants{
padding:40px;
}

.consultant{
background:#111;
margin:10px;
padding:20px;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

.consultant:hover{
background:#00f7ff;
color:#000;
}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popup-content{
background:#111;
padding:30px;
border-radius:20px;
width:90%;
max-width:400px;
text-align:center;
}

.close{
cursor:pointer;
color:red;
font-size:20px;
}

/* CONTACT */
.contact{
position:fixed;
bottom:20px;
right:20px;
background:#00f7ff;
color:#000;
padding:15px 20px;
border-radius:50px;
cursor:pointer;
box-shadow:0 0 20px #00f7ff;
}

</style>
</head>

<body>

<nav>
<h1>⚖️ Law Pro</h1>
<div>
<a href="#">الرئيسية</a>
<a href="#services">الخدمات</a>
<a href="#consultants">المستشارين</a>
</div>
</nav>

<section class="hero">
<h2>مرحبًا بك في أقوى مكتب محاماة</h2>
<p>خبرة - احتراف - نتائج مضمونة</p>
</section>

<!-- SERVICES -->
<section class="services" id="services">

<div class="card" onclick="openPopup('قضايا جنائية','الدفاع في قضايا القتل والمخدرات')">
⚖️ <h3>جنائي</h3>
</div>

<div class="card" onclick="openPopup('قضايا الأسرة','طلاق - نفقة - حضانة')">
👨‍👩‍👧 <h3>أسرة</h3>
</div>

<div class="card" onclick="openPopup('قضايا مدنية','تعويضات ونزاعات')">
🏛️ <h3>مدني</h3>
</div>

<div class="card" onclick="openPopup('قوانين','جميع القوانين المصرية')">
📚 <h3>القوانين</h3>
</div>

<div class="card" onclick="openPopup('أعمالي','كل القضايا الناجحة')">
💼 <h3>أعمالي</h3>
</div>

<div class="card" onclick="openPopup('شركات','تأسيس شركات وعقود')">
🏢 <h3>شركات</h3>
</div>

</section>

<!-- CONSULTANTS -->
<section class="consultants" id="consultants">

<h2>المستشارين</h2>

<div class="consultant" onclick="showConsultant('أحمد علي','جنائي','⭐⭐⭐⭐⭐','01011111111')">
أحمد علي
</div>

<div class="consultant" onclick="showConsultant('محمد حسن','أسرة','⭐⭐⭐⭐','01022222222')">
محمد حسن
</div>

<div class="consultant" onclick="showConsultant('كريم محمود','مدني','⭐⭐⭐⭐⭐','01033333333')">
كريم محمود
</div>

</section>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-content">
<span class="close" onclick="closePopup()">X</span>
<h2 id="title"></h2>
<p id="desc"></p>
</div>
</div>

<!-- CONTACT BUTTON -->
<div class="contact" onclick="callNow()">
📞 اتصل الآن
</div>

<script>

function openPopup(title,desc){
document.getElementById("popup").style.display="flex";
document.getElementById("title").innerText=title;
document.getElementById("desc").innerText=desc;
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function callNow(){
window.location.href="tel:01090828974";
}

function showConsultant(name,special,rate,phone){
openPopup(
name,
"التخصص: "+special+" | التقييم: "+rate+" | رقمه: "+phone
);
}

</script>

</body>
</html>
